<div class="cand-page">
  <header class="cand-header">
    <h1>Mes candidatures</h1>
  </header>

  @if (chargement()) {
    <p class="cand-info">Chargement…</p>
  } @else if (erreur()) {
    <p class="erreur">{{ erreur() }}</p>
  } @else if (candidatures().length === 0) {
    <p class="cand-info">
      Tu n'as pas encore postulé. <a routerLink="/biens">Voir les kots disponibles →</a>
    </p>
  } @else {
    <div class="cand-liste">
      @for (c of candidatures(); track c.candidatureID) {
        <app-candidature-card [candidature]="c" />
      }
    </div>
  }
</div>
