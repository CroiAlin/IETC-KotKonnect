<div class="detail-galerie">
  @if (photoActive(); as photo) {
    <img class="detail-galerie__principale" [src]="photo" [alt]="titre()" />
  } @else {
    <div class="detail-galerie__placeholder">Pas de photo</div>
  }

  @if (photos().length > 1) {
    <div class="detail-galerie__miniatures">
      @for (p of photos(); track p.photoID) {
        <img
          [src]="p.urlImage"
          [alt]="titre()"
          class="detail-miniature"
          [class.detail-miniature--active]="p.urlImage === photoActive()"
          (click)="choisirPhoto(p.urlImage)" />
      }
    </div>
  }
</div>
